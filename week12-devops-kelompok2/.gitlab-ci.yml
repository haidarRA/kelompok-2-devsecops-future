image: golang:1.25-alpine

stages: 
  - init
  - test
  - build
  - policy-check
  - package
  - verify
  - security-scan
  - release
  - deploy

variables:
  POSTGRES_DB: taskflow_test
  POSTGRES_USER: user
  POSTGRES_PASSWORD: password
  POSTGRES_HOST_AUTH_METHOD: trust
  DATABASE_URL: "postgres://user:password@postgres:5432/taskflow_test?sslmode=disable"
  CONTAINER_IMAGE: $CI_REGISTRY_IMAGE:sha-$CI_COMMIT_SHORT_SHA
  STABLE_IMAGE: $CI_REGISTRY_IMAGE:stable
  LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest

services:
  - name: postgres:16-alpine
    alias: postgres

.notify_template: &notify_template
  after_script:
    - apk add --no-cache curl tzdata
    - cp /usr/share/zoneinfo/Asia/Jakarta /etc/localtime # Set waktu ke WIB
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        SYMBOL="✅"
        STATUS="SUCCESS"
      else
        SYMBOL="❌"
        STATUS="FAILED"
      fi
      
      CURR_TIME=$(date "+%Y-%m-%d %H:%M")
      
      # Menyusun pesan telegram bot biar sesuai
      MESSAGE="${SYMBOL} <b>PIPELINE ${STATUS}</b>%0A%0A"
      MESSAGE="${MESSAGE}<b>Job:</b> ${CI_JOB_NAME}%0A"
      MESSAGE="${MESSAGE}<b>Branch:</b> ${CI_COMMIT_REF_NAME}%0A"
      MESSAGE="${MESSAGE}<b>Commit:</b> ${CI_COMMIT_SHORT_SHA}%0A"
      MESSAGE="${MESSAGE}<b>Status:</b> ${STATUS}%0A"
      MESSAGE="${MESSAGE}<b>Pipeline:</b>%0A${CI_PIPELINE_URL}%0A%0A"
      MESSAGE="${MESSAGE}<b>Time:</b>%0A${CURR_TIME}"
      
      curl -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=HTML"

before_script:
  - apk add --no-cache make gcc musl-dev bc curl
  - cd pbl-taskflow-go

prepare_module:
  stage: init
  script:
    - go mod tidy
  artifacts:
    paths:
      - pbl-taskflow-go/go.mod
  <<: *notify_template

test_job:
  stage: test
  needs: ["prepare_module"]
  script:
    - go test -v ./...
  <<: *notify_template

compile-binary:
  stage: build
  needs: ["test_job"]
  script:
    - mkdir -p bin
    - go build -o bin/taskflow-api ./cmd/server
  artifacts:
    paths:
      - pbl-taskflow-go/bin/

build-docker-image:
  stage: package
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - docker build -t $CONTAINER_IMAGE .
    - docker push $CONTAINER_IMAGE
  only:
    - main
  <<: *notify_template

smoke_test_job:
  stage: verify
  image: docker:24.0.5

  services:
    - docker:24.0.5-dind

  variables:
    DOCKER_TLS_CERTDIR: ""

  needs: ["build-docker-image"]

  before_script:
    - apk add --no-cache curl
    - apk add --no-cache curl socat
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

  script:
    # Pull image
    - docker pull $CONTAINER_IMAGE

    # Create network
    - docker network create smoke-net

    # Run PostgreSQL
    - |
      docker run -d \
      --name postgres-smoke \
      --network smoke-net \
      -e POSTGRES_DB=taskflow_test \
      -e POSTGRES_USER=user \
      -e POSTGRES_PASSWORD=password \
      postgres:16-alpine

    # Wait PostgreSQL ready
    - |
      until docker exec postgres-smoke pg_isready -U user; do
        echo "⏳ Waiting PostgreSQL..."
        sleep 2
      done

    # Run app
    - |
      docker run -d \
      --name app-smoke \
      --network smoke-net \
      -p 8080:8080 \
      -e DATABASE_URL="postgres://user:password@postgres-smoke:5432/taskflow_test?sslmode=disable" \
      $CONTAINER_IMAGE


    # 3. JEMBATAN KE LOCALHOST (Socat tunnel)
    # Ini menghubungkan localhost Runner ke port 8080 milik service Docker
    - socat TCP-LISTEN:8080,fork TCP:docker:8080 &
    - echo "Waiting for server to start..."

    # Tunggu App
    - sleep 15

    # Smoke test health
    - |
      echo "Checking /health via localhost..."
      if curl -f http://localhost:8080/health; then
        echo "✅ Health endpoint OK"
      else
        echo "❌ Health endpoint FAILED"
        docker logs app-smoke
        exit 1
      fi

    # Smoke test stats
    - |
      echo "Checking /api/v1/stats via localhost..."
      if curl -f http://localhost:8080/api/v1/stats; then
        echo "✅ Stats endpoint OK"
      else
        echo "❌ Stats endpoint FAILED"
        docker logs app-smoke
        exit 1
      fi

    - echo "✅ Smoke test berhasil"

  after_script:
    - docker stop app-smoke postgres-smoke || true
    - docker rm app-smoke postgres-smoke || true

  <<: *notify_template

  only:
    - main

update-stable-image:
  stage: release
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind

  variables:
    DOCKER_TLS_CERTDIR: ""

  needs:
    - smoke_test_job
    - security_sca_fs
    - security_container_image

  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin

  script:
    - docker pull $CONTAINER_IMAGE
    - docker tag $CONTAINER_IMAGE $STABLE_IMAGE
    - docker push $STABLE_IMAGE
    - echo "Stable image updated to $CONTAINER_IMAGE"

  after_script:
    - apk add --no-cache curl tzdata
    - cp /usr/share/zoneinfo/Asia/Jakarta /etc/localtime
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        SYMBOL="✅"
        STATUS="SUCCESS"
      else
        SYMBOL="❌"
        STATUS="FAILED"
      fi

      CURR_TIME=$(date "+%Y-%m-%d %H:%M")

      MESSAGE="${SYMBOL} <b>STABLE TAG ${STATUS}</b>%0A%0A"
      MESSAGE="${MESSAGE}<b>Job:</b> ${CI_JOB_NAME}%0A"
      MESSAGE="${MESSAGE}<b>Branch:</b> ${CI_COMMIT_REF_NAME}%0A"
      MESSAGE="${MESSAGE}<b>Commit:</b> ${CI_COMMIT_SHORT_SHA}%0A"
      MESSAGE="${MESSAGE}<b>Status:</b> ${STATUS}%0A"
      MESSAGE="${MESSAGE}<b>Stable Image:</b>%0A${STABLE_IMAGE}%0A"
      MESSAGE="${MESSAGE}<b>Pipeline:</b>%0A${CI_PIPELINE_URL}%0A%0A"
      MESSAGE="${MESSAGE}<b>Time:</b>%0A${CURR_TIME}"

      curl -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
        -d "chat_id=${TELEGRAM_ID}" \
        -d "text=${MESSAGE}" \
        -d "parse_mode=HTML"

  only:
    - main

  <<: *notify_template

security_sca_fs:
  stage: security-scan
  image:
    name: aquasec/trivy:0.52.2
    entrypoint: [""]
  needs: ["prepare_module"]
  before_script: []
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
  script:
    - mkdir -p security-reports
    - trivy --version
    - trivy fs --scanners vuln --format json --output security-reports/trivy-fs-report.json --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 pbl-taskflow-go
    - trivy fs --scanners vuln --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 pbl-taskflow-go
  cache:
    paths:
      - .trivycache/
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - security-reports/trivy-fs-report.json
  only:
    - main
    - develop

security_container_image:
  stage: security-scan
  image:
    name: aquasec/trivy:0.52.2
    entrypoint: [""]
  needs: ["build-docker-image"]
  before_script: []
  variables:
    TRIVY_NO_PROGRESS: "true"
    TRIVY_CACHE_DIR: ".trivycache/"
    TRIVY_USERNAME: "$CI_REGISTRY_USER"
    TRIVY_PASSWORD: "$CI_REGISTRY_PASSWORD"
    TRIVY_AUTH_URL: "$CI_REGISTRY"
  script:
    - mkdir -p security-reports
    - trivy --version
    - trivy image --format json --output security-reports/trivy-image-report.json --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0 $CONTAINER_IMAGE
    - trivy image --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 $CONTAINER_IMAGE
  cache:
    paths:
      - .trivycache/
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - security-reports/trivy-image-report.json
  only:
    - main

deploy_to_github_manifest:
  stage: deploy
  image: alpine:latest
  needs: ["update-stable-image"]
  before_script:
    - apk add --no-cache git bash
    - git config --global user.email "devops-pipeline@gitlab.com"
    - git config --global user.name "GitLab CI/CD Bot"
  script:
    - echo "Mengeclone repository manifest Kubernetes dari GitHub..."
    - git clone https://oauth2:$GITHUB_PAT@github.com/haidarRA/week12-devops-kelompok2.git repo-k8s
    - cd repo-k8s
    - echo "Memperbarui tag image di deployment.yaml secara dinamis..."
    - 'sed -i "s|image: .*|image: $CONTAINER_IMAGE|g" kubernetes/deployment.yaml'
    - echo "Melakukan commit dan push perubahan manifest kembali ke GitHub..."
    - git add kubernetes/deployment.yaml
    - |
      if git diff-index --quiet HEAD --; then
        echo "Tidak ada perubahan manifest yang terdeteksi."
      else
        git commit -m "chore(ci): update production image to sha-$CI_COMMIT_SHORT_SHA [skip ci]"
        git push origin main
      fi
  only:
    - main
  <<: *notify_template

validate-k8s-manifest:
  stage: policy-check
  image: openpolicyagent/conftest:v0.55.0
  needs: ["compile-binary"]
  before_script: []
  script:
    - echo "Menjalankan OPA policy check terhadap manifest Kubernetes..."
    - conftest test kubernetes/deployment.yaml --policy policies/opa/ --output table
  <<: *notify_template
  only:
    - main
    - develop
