# Expected: ALLOW (requests + limits, nilai wajar)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-s3-04
  namespace: taskflow-prod
spec:
  replicas: 1
  selector:
    matchLabels: {app: test-s3-04}
  template:
    metadata:
      labels: {app: test-s3-04}
    spec:
      containers:
        - name: app
          image: registry.gitlab.com/haidarra-devops/week-9-devops-taskflow:sha-abc1234
          resources:
            requests: {cpu: "100m", memory: "128Mi"}
            limits: {cpu: "500m", memory: "256Mi"}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
