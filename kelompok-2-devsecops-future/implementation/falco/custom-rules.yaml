# ============================================================
# Falco Custom Rule - berdasarkan Paper B (Shenoy et al., 2025)
# Mendeteksi shell yang di-spawn di dalam container -- indikasi
# kuat adanya unauthorized access / privilege escalation attempt
# ============================================================

- rule: Terminal shell in container
  desc: Detects shell spawned inside a container
  condition: container.id != host and proc.name in (bash, sh, zsh)
  output: "Shell spawned inside container (user=%user.name command=%proc.cmdline container=%container.name pod=%k8s.pod.name namespace=%k8s.ns.name)"
  priority: CRITICAL
  tags: ["container", "shell", "taskflow-enhancement"]
  rate: 10
  max_burst: 10

# Catatan untuk evaluation/analysis.md:
# Rule ini SENGAJA dibuat sensitif terhadap proc.name == bash/sh/zsh
# karena tujuan riset adalah mengukur MTTD/MTTR pada skenario shell-spawning
# spesifik (sesuai metodologi Paper B), bukan general intrusion detection.
#
# Untuk false-positive testing (skenario RT-03), pastikan operasi berikut
# TIDAK memicu rule ini:
#   - kubectl logs <pod>
#   - kubectl exec <pod> -- ls / ps / cat (bukan bash/sh/zsh)
#   - kubectl port-forward
#   - curl ke /health endpoint
