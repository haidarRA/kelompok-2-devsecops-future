apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-api
  namespace: taskflow-prod
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: taskflow-api
  template:
    metadata:
      labels:
        app: taskflow-api
    spec:
      imagePullSecrets:
              - name: gitlab-registry-secret
      containers:
        - name: taskflow-api
          image: registry.gitlab.com/haidarra-devops/week-9-devops-taskflow:sha-430e8c35
          args:
            - "-text=Halo dari TaskFlow API v2! Fitur Baru!"
            - "-listen=:8080"
          ports:
            - containerPort: 8080